<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | SOMUN 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { 
            --primary: #991116; 
            --text: #FFFFFF; 
            --bg: #000000; 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body { 
            background: #000000;
            color: var(--text); 
            font-family: 'Source Sans Pro', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #globe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.9;
        }

        .mobile-nav-btn {
            display: none;
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 4;
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        nav { 
            position: relative;
            z-index: 3;
            padding: 1.5rem 2rem; 
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-links { 
            display: flex; 
            justify-content: space-around; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .nav-links a { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 600; 
            padding: 0.5rem 1rem; 
            transition: all 0.3s; 
            border-bottom: 2px solid transparent; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .nav-links a:hover { 
            color: var(--primary); 
            border-bottom: 2px solid var(--primary); 
        }

        .coming-soon {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .coming-soon h1 {
            font-size: 5rem;
            color: #ffffff;
            font-family: 'Lato', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 15px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            animation: float 6s ease-in-out infinite;
            position: relative;
            margin-top: 0;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        footer {
            position: relative;
            z-index: 3;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .mobile-nav-btn {
                display: block;
            }

            .nav-links {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.95);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2rem;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a {
                font-size: 1.2rem;
                padding: 1rem;
            }

            .coming-soon h1 {
                font-size: 2.8rem;
                letter-spacing: 8px;
                margin-top: -4rem;
            }

            #globe-container {
                transform: scale(0.7) translateY(-15%);
            }
        }

        @media (max-width: 480px) {
            .coming-soon h1 {
                font-size: 2rem;
                letter-spacing: 4px;
                margin-top: -6rem;
            }

            #globe-container {
                transform: scale(0.5) translateY(-25%);
            }
        }

        @media (max-height: 600px) {
            .coming-soon h1 {
                font-size: 1.8rem;
                margin-top: -2rem;
            }

            #globe-container {
                transform: scale(0.4) translateY(-35%);
            }
        }
    </style>
</head>
<body>
    <div id="globe-container"></div>
    
    <nav>
        <button class="mobile-nav-btn" aria-label="Toggle navigation">☰</button>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="committees.html">Committees</a>
            <a href="schedule.html">Schedule</a>
            <a href="registration.html">Registration</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="coming-soon">
        <h1>Coming Soon</h1>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 SOMUN. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Mobile navigation functionality
        const mobileBtn = document.querySelector('.mobile-nav-btn');
        const navLinks = document.querySelector('.nav-links');

        mobileBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            mobileBtn.textContent = navLinks.classList.contains('active') ? '×' : '☰';
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                mobileBtn.textContent = '☰';
            });
        });

        // Globe animation
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            alpha: true, 
            antialias: true,
            powerPreference: "high-performance"
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('globe-container').appendChild(renderer.domElement);

        // Create main sphere with cleaner wireframe
        const geometry = new THREE.SphereGeometry(5, 20, 20);
        const material = new THREE.MeshBasicMaterial({
            color: 0x991116,
            wireframe: true,
            transparent: true,
            opacity: 0.9
        });

        // Create inner sphere
        const innerGeometry = new THREE.SphereGeometry(4.8, 15, 15);
        const innerMaterial = new THREE.MeshBasicMaterial({
            color: 0x991116,
            wireframe: true,
            transparent: true,
            opacity: 0.2
        });

        const sphere = new THREE.Mesh(geometry, material);
        const innerSphere = new THREE.Mesh(innerGeometry, innerMaterial);
        
        scene.add(sphere);
        scene.add(innerSphere);

        // Adjust camera position based on screen size
        function updateCameraPosition() {
            const isMobile = window.innerWidth <= 768;
            camera.position.z = isMobile ? 15 : 12;
            camera.updateProjectionMatrix();
        }
        
        updateCameraPosition();

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.x += 0.001;
            sphere.rotation.y += 0.002;
            
            innerSphere.rotation.x -= 0.001;
            innerSphere.rotation.y -= 0.001;
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            updateCameraPosition();
        });

        animate();
    </script>
</body>
</html>
