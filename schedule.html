<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | SOMUN 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { 
            --primary: #cc171e; 
            --text: #FFFFFF; 
            --bg: #000000; 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body { 
            background: linear-gradient(to bottom, #000000, #1a1a1a);
            color: var(--text); 
            font-family: 'Source Sans Pro', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #globe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.7;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 2;
        }

        nav { 
            position: relative;
            z-index: 3;
            padding: 1.5rem 2rem; 
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-links { 
            display: flex; 
            justify-content: space-around; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .nav-links a { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: 600; 
            padding: 0.5rem 1rem; 
            transition: all 0.3s; 
            border-bottom: 2px solid transparent; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .nav-links a:hover { 
            color: var(--primary); 
            border-bottom: 2px solid var(--primary); 
        }

        .coming-soon {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .coming-soon h1 {
            font-size: 6.5rem;
            color: #ffffff;
            font-family: 'Lato', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 12px;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.5),
                0 0 20px rgba(255,255,255,0.3),
                0 0 30px rgba(255,255,255,0.2);
            animation: float 6s ease-in-out infinite;
            position: relative;
        }

        .coming-soon h1::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        footer {
            position: relative;
            z-index: 3;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .coming-soon h1 {
                font-size: 4rem;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="globe-container"></div>
    
    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="committees.html">Committees</a>
            <a href="schedule.html">Schedule</a>
            <a href="registration.html">Registration</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="coming-soon">
        <h1>Coming Soon</h1>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 SOMUN. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            alpha: true, 
            antialias: true,
            powerPreference: "high-performance"
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('globe-container').appendChild(renderer.domElement);

        // Create main sphere
        const geometry = new THREE.SphereGeometry(5, 64, 64);
        const material = new THREE.MeshBasicMaterial({
            color: 0xcc171e,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });

        // Create inner sphere
        const innerGeometry = new THREE.SphereGeometry(4.8, 32, 32);
        const innerMaterial = new THREE.MeshBasicMaterial({
            color: 0xcc171e,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });

        const sphere = new THREE.Mesh(geometry, material);
        const innerSphere = new THREE.Mesh(innerGeometry, innerMaterial);
        
        scene.add(sphere);
        scene.add(innerSphere);

        camera.position.z = 10;

        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;

        document.addEventListener('mousemove', (event) => {
            targetRotationX = (event.clientY / window.innerHeight - 0.5) * 0.5;
            targetRotationY = (event.clientX / window.innerWidth - 0.5) * 0.5;
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Smooth rotation
            currentRotationX += (targetRotationX - currentRotationX) * 0.05;
            currentRotationY += (targetRotationY - currentRotationY) * 0.05;
            
            sphere.rotation.x = currentRotationX;
            sphere.rotation.y += 0.003;
            
            innerSphere.rotation.x = -currentRotationX * 0.5;
            innerSphere.rotation.y -= 0.001;
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        animate();
    </script>
</body>
</html>
